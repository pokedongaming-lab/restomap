<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RestoBuilder — RestoSuite</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#030303;--bg2:#0a0a0a;--bg3:#111;--panel:#0d0d0d;--b:rgba(255,109,0,.15);--b2:rgba(255,109,0,.38);--a:#FF6D00;--a2:#FF8F00;--a3:rgba(255,109,0,.07);--t:#FFB74D;--t2:#FFA726;--t3:rgba(255,183,77,.45);--t4:rgba(255,183,77,.15);--pos:#69F0AE;--neg:#FF5252;--info:#4DA6FF;}
.th-matrix{--bg:#000500;--bg2:#000a00;--bg3:#001100;--panel:#000d00;--b:rgba(0,255,65,.14);--b2:rgba(0,255,65,.36);--a:#00FF41;--a2:#00E636;--a3:rgba(0,255,65,.06);--t:#00E676;--t2:#00C853;--t3:rgba(0,230,118,.42);--t4:rgba(0,230,118,.14);}
.th-arctic{--bg:#000B14;--bg2:#001122;--bg3:#001830;--panel:#000E1A;--b:rgba(0,229,255,.14);--b2:rgba(0,229,255,.36);--a:#00E5FF;--a2:#00B8D4;--a3:rgba(0,229,255,.06);--t:#80DEEA;--t2:#4DD0E1;--t3:rgba(128,222,234,.42);--t4:rgba(128,222,234,.14);}
.th-ember{--bg:#0D0000;--bg2:#150000;--bg3:#1a0000;--panel:#100000;--b:rgba(255,61,0,.16);--b2:rgba(255,61,0,.38);--a:#FF3D00;--a2:#FF6E40;--a3:rgba(255,61,0,.06);--t:#FFAB91;--t2:#FF8A65;--t3:rgba(255,171,145,.42);--t4:rgba(255,171,145,.14);}
.th-mercury{--bg:#08080F;--bg2:#0D0D1A;--bg3:#11112A;--panel:#0A0A16;--b:rgba(180,180,220,.12);--b2:rgba(180,180,220,.30);--a:#B0B8E0;--a2:#9098C8;--a3:rgba(180,180,220,.05);--t:#C8D0F0;--t2:#A0A8D8;--t3:rgba(200,208,240,.42);--t4:rgba(200,208,240,.14);}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--t);font-family:'Share Tech Mono',monospace;font-size:11px;transition:background .4s;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.025) 3px,rgba(0,0,0,.025) 4px);pointer-events:none;z-index:9999;}

/* TOPBAR */
.tb{display:flex;align-items:center;height:38px;background:var(--bg2);border-bottom:1px solid var(--b2);flex-shrink:0;}
.tb-logo{display:flex;flex-direction:column;justify-content:center;padding:0 14px;height:100%;border-right:1px solid var(--b);flex-shrink:0;gap:1px;}
.logo-t{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--a);letter-spacing:3px;}
.logo-s{font-size:8px;color:var(--t3);letter-spacing:1.5px;}
.nav-links{display:flex;height:100%;border-right:1px solid var(--b);}
.nl{display:flex;align-items:center;padding:0 16px;height:100%;font-size:10px;cursor:pointer;color:var(--t3);border-right:1px solid var(--b);letter-spacing:1px;text-decoration:none;transition:all .2s;}
.nl:hover{color:var(--t);background:var(--a3);}
.nl.active{color:var(--a);border-bottom:2px solid var(--a);}
.prefill-banner{display:none;align-items:center;gap:8px;padding:0 14px;height:100%;border-right:1px solid var(--b);font-size:9px;color:var(--t3);}
.pf-dot{width:5px;height:5px;border-radius:50%;background:var(--pos);flex-shrink:0;}
.pf-txt{color:var(--pos);}
.tb-clock{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--a);padding:0 12px;border-right:1px solid var(--b);letter-spacing:1px;}
.step-progress{display:flex;align-items:center;gap:0;padding:0 12px;border-right:1px solid var(--b);}
.sp-num{font-size:9px;color:var(--t3);letter-spacing:.5px;}
.sp-bar{display:flex;gap:3px;margin:0 8px;}
.sp-dot{width:6px;height:6px;border-radius:50%;background:var(--b);transition:all .3s;}
.sp-dot.done{background:var(--pos);}
.sp-dot.on{background:var(--a);}
.spacer{flex:1;}
.theme-grp{display:flex;align-items:center;gap:5px;padding:0 12px;}
.tc{width:13px;height:13px;border-radius:2px;cursor:pointer;border:1px solid transparent;transition:all .2s;}
.tc:hover,.tc.on{border-color:var(--t);transform:scale(1.25);}

/* MAIN LAYOUT */
.app{display:flex;height:calc(100vh - 38px);}

/* SIDEBAR */
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.sb-header{padding:14px 14px 10px;border-bottom:1px solid var(--b);}
.sb-title{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--a);letter-spacing:2px;}
.sb-sub{font-size:8px;color:var(--t3);margin-top:2px;}
.step-list{padding:8px 0;flex:1;}
.step-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;border-left:2px solid transparent;transition:all .2s;}
.step-item:hover{background:var(--a3);}
.step-item.on{border-left-color:var(--a);background:var(--a3);}
.step-item.done{border-left-color:var(--pos);}
.step-item.locked{opacity:.45;cursor:not-allowed;}
.si-num{font-family:'Orbitron',sans-serif;font-size:9px;width:18px;height:18px;border-radius:50%;border:1px solid var(--b);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s;}
.step-item.on .si-num{border-color:var(--a);color:var(--a);}
.step-item.done .si-num{border-color:var(--pos);color:var(--pos);}
.si-info{flex:1;min-width:0;}
.si-title{font-size:9px;color:var(--t3);letter-spacing:.5px;transition:color .2s;}
.step-item.on .si-title{color:var(--a);}
.step-item.done .si-title{color:var(--pos);}
.si-status{font-size:7px;color:var(--t4);letter-spacing:.5px;}
.sb-footer{padding:10px 14px;border-top:1px solid var(--b);}
.sb-tier{font-size:8px;color:var(--t3);letter-spacing:1px;}

/* MAIN CONTENT */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.step-header{padding:14px 20px 10px;border-bottom:1px solid var(--b);background:var(--bg2);flex-shrink:0;}
.sh-num{font-size:8px;color:var(--t4);letter-spacing:2px;margin-bottom:3px;}
.sh-title{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--a);letter-spacing:2px;}
.sh-sub{font-size:9px;color:var(--t3);margin-top:3px;}
.step-body{flex:1;overflow-y:auto;padding:16px 20px;}

/* FORM */
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.form-grid.cols3{grid-template-columns:repeat(3,1fr);}
.form-grid.cols1{grid-template-columns:1fr;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg.span2{grid-column:span 2;}
.fl{font-size:8px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;}
.fi{background:var(--bg3);border:1px solid var(--b);color:var(--t);padding:7px 10px;font-family:'Share Tech Mono',monospace;font-size:11px;outline:none;width:100%;transition:border-color .2s;}
.fi:focus{border-color:var(--a);}
select.fi option{background:var(--bg3);}
.fi[type=range]{padding:0;background:none;cursor:pointer;accent-color:var(--a);}
.fi-hint{font-size:8px;color:var(--t4);margin-top:1px;}
.slider-val{font-size:9px;color:var(--a);font-family:'Orbitron',sans-serif;}

/* MENU TABLE */
.menu-table{width:100%;border-collapse:collapse;margin-bottom:8px;}
.menu-table th{font-size:8px;color:var(--t3);letter-spacing:1px;padding:5px 6px;border-bottom:1px solid var(--b);text-align:left;font-weight:normal;text-transform:uppercase;}
.menu-table td{padding:4px 4px;border-bottom:1px solid var(--b);}
.menu-table td input,.menu-table td select{background:var(--bg3);border:1px solid var(--b);color:var(--t);padding:4px 6px;font-family:'Share Tech Mono',monospace;font-size:10px;width:100%;outline:none;}
.menu-table td input:focus,.menu-table td select:focus{border-color:var(--a);}
.btn-icon{background:none;border:1px solid var(--b);color:var(--neg);width:24px;height:24px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
.btn-add{background:var(--a3);border:1px solid var(--b2);color:var(--a);padding:5px 12px;cursor:pointer;font-size:8px;font-family:'Share Tech Mono',monospace;letter-spacing:1px;transition:all .2s;}
.btn-add:hover{background:var(--a);color:#000;}

/* STEP FOOTER */
.step-footer{padding:12px 20px;border-top:1px solid var(--b);background:var(--bg2);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.btn-nav{padding:8px 20px;font-size:9px;cursor:pointer;font-family:'Share Tech Mono',monospace;letter-spacing:1px;transition:all .2s;border:1px solid var(--b);background:none;color:var(--t3);}
.btn-nav:hover{border-color:var(--t);color:var(--t);}
.btn-next{border-color:var(--a2);color:var(--a);background:var(--a3);}
.btn-next:hover{background:var(--a);color:#000;}
.btn-finish{border-color:var(--pos);color:var(--pos);background:rgba(105,240,174,.05);}
.btn-finish:hover{background:var(--pos);color:#000;}
.step-progress-text{font-size:9px;color:var(--t3);}

/* LIVE PANEL */
.live-panel{width:260px;background:var(--panel);border-left:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0;}
.lp-header{padding:10px 12px;border-bottom:1px solid var(--b);background:var(--a3);}
.lp-title{font-size:8px;color:var(--a);letter-spacing:2px;}
.lp-body{flex:1;overflow-y:auto;padding:10px 12px;}
.lp-section{margin-bottom:12px;}
.lp-sec-title{font-size:8px;color:var(--t4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--b);}
.lp-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(255,109,0,.06);}
.lp-lbl{font-size:8px;color:var(--t3);}
.lp-val{font-size:9px;color:var(--t);font-family:'Orbitron',sans-serif;}
.lp-val.pos{color:var(--pos);}
.lp-val.warn{color:var(--a);}
.lp-val.neg{color:var(--neg);}
.lp-chart-wrap{height:120px;margin-top:8px;}
.lp-mm-cell{padding:5px 6px;margin:2px 0;border:1px solid var(--b);display:flex;justify-content:space-between;align-items:center;}
.lp-mm-type{font-size:7px;letter-spacing:1px;text-transform:uppercase;font-weight:bold;}
.lp-mm-item{font-size:8px;color:var(--t3);}

/* RESULTS PAGE */
.results-page{flex:1;overflow-y:auto;padding:16px 20px;display:none;}
.results-page.on{display:block;}
.res-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.res-card{background:var(--bg2);border:1px solid var(--b);padding:10px 12px;}
.rc-lbl{font-size:8px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.rc-val{font-family:'Orbitron',sans-serif;font-size:18px;color:var(--a);line-height:1;}
.rc-sub{font-size:8px;color:var(--t3);margin-top:2px;}
.res-charts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.chart-card{background:var(--bg2);border:1px solid var(--b);padding:10px;}
.cc-title{font-size:8px;color:var(--t3);letter-spacing:1.5px;margin-bottom:8px;text-transform:uppercase;}
.cc-h{height:180px;}
.res-table{width:100%;border-collapse:collapse;font-size:9px;margin-bottom:12px;}
.res-table th{font-size:8px;color:var(--t3);letter-spacing:1px;padding:6px 8px;border-bottom:1px solid var(--b);text-align:left;font-weight:normal;text-transform:uppercase;background:var(--bg3);}
.res-table td{padding:6px 8px;border-bottom:1px solid var(--b);color:var(--t2);}
.res-table tr:hover td{background:var(--a3);}
.sens-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:1px solid var(--b);margin-bottom:12px;}
.sg-cell{padding:8px 6px;border-right:1px solid var(--b);border-bottom:1px solid var(--b);font-size:8px;text-align:center;}
.sg-cell:last-child{border-right:none;}
.sg-header{color:var(--t3);letter-spacing:.5px;background:var(--bg3);}
.sg-base{color:var(--t);}
.sg-pos{color:var(--pos);}
.sg-neg{color:var(--neg);}
.action-row{display:flex;gap:8px;margin-bottom:12px;}
.action-btn{flex:1;padding:10px;border:1px solid var(--b2);color:var(--a);background:var(--a3);font-family:'Share Tech Mono',monospace;font-size:9px;cursor:pointer;letter-spacing:1px;transition:all .2s;text-align:center;}
.action-btn:hover{background:var(--a);color:#000;}
.wa-btn{border-color:var(--pos);color:var(--pos);background:rgba(105,240,174,.05);}
.wa-btn:hover{background:var(--pos);color:#000;}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--b2);}
::-webkit-scrollbar-thumb:hover{background:var(--a);}
</style>
</head>
<body id="body">

<!-- TOPBAR -->
<div class="tb">
  <div class="tb-logo">
    <div class="logo-t">RestoSuite</div>
    <div class="logo-s">TERMINAL v1.1</div>
  </div>
  <div class="nav-links">
    <a class="nl" href="restomap.html">RestoMap</a>
    <a class="nl active">RestoBuilder</a>
  </div>
  <div class="prefill-banner" id="prefillBanner">
    <div class="pf-dot"></div>
    <span class="pf-txt" id="prefillText">Data dari RestoMap dimuat</span>
  </div>
  <div class="tb-clock" id="clock">--:--:--</div>
  <div class="step-progress">
    <span class="sp-num" id="spNum">STEP 1/8</span>
    <div class="sp-bar" id="spBar"></div>
  </div>
  <div class="spacer"></div>
  <div class="theme-grp">
    <div class="tc on" style="background:#FF6D00" onclick="setTheme('')"></div>
    <div class="tc" style="background:#00FF41" onclick="setTheme('th-matrix')"></div>
    <div class="tc" style="background:#00E5FF" onclick="setTheme('th-arctic')"></div>
    <div class="tc" style="background:#FF3D00" onclick="setTheme('th-ember')"></div>
    <div class="tc" style="background:#B0B8E0" onclick="setTheme('th-mercury')"></div>
  </div>
</div>

<!-- APP -->
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-header">
      <div class="sb-title">WIZARD PROGRESS</div>
      <div class="sb-sub" id="sbSub">Belum ada data</div>
    </div>
    <div class="step-list" id="stepList"></div>
    <div class="sb-footer">
      <div class="sb-tier" id="sbTier">TIER: FREE</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="mainArea">
    <div class="step-header">
      <div class="sh-num" id="shNum">STEP 1 OF 8</div>
      <div class="sh-title" id="shTitle">CONCEPT & BASICS</div>
      <div class="sh-sub" id="shSub">Definisikan konsep dasar restoran Anda</div>
    </div>
    <div class="step-body" id="stepBody"></div>
    <div class="step-footer">
      <button class="btn-nav" id="btnBack" onclick="goStep(-1)" style="display:none">← KEMBALI</button>
      <span class="step-progress-text" id="sfProgress">Lengkapi semua field yang diperlukan</span>
      <button class="btn-nav btn-next" id="btnNext" onclick="goStep(1)">LANJUT →</button>
    </div>
    <!-- Results page (replaces step body) -->
    <div class="results-page" id="resultsPage"></div>
  </div>

  <!-- LIVE PANEL -->
  <div class="live-panel">
    <div class="lp-header"><div class="lp-title" id="lpTitle">LIVE PREVIEW</div></div>
    <div class="lp-body" id="livePanelBody"></div>
  </div>

</div>

<script>
// ═══ CLOCK ═══
function tick(){const n=new Date();document.getElementById('clock').textContent=[n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');}
setInterval(tick,1000);tick();

// ═══ THEME ═══
function setTheme(c){document.body.className=c;document.querySelectorAll('.tc').forEach((el,i)=>el.classList.toggle('on',['','th-matrix','th-arctic','th-ember','th-mercury'][i]===c));rebuildLiveCharts();}

// ═══ STATE ═══
let currentStep=0,tier='free',formData={},menuItems=[{n:'Nasi Goreng Spesial',cat:'main',price:85000,cogs:32},{n:'Ayam Bakar Madu',cat:'main',price:75000,cogs:35}];
let prefill={},liveRevChart=null,liveKurChart=null,resCharts={};

// ═══ PREFILL FROM URL ═══
function loadPrefill(){
  const p=new URLSearchParams(window.location.search);
  if(p.has('city')){
    prefill={city:p.get('city'),zone:p.get('zone'),type:p.get('type'),lat:p.get('lat'),lng:p.get('lng'),score:p.get('score'),revM:p.get('revM'),comp:p.get('comp'),tier:p.get('tier')};
    tier=prefill.tier||'free';
    if(prefill.city){
      document.getElementById('prefillBanner').style.display='flex';
      document.getElementById('prefillText').textContent=`Pre-filled: ${prefill.city} (${prefill.zone})`;
    }
    // Pre-populate form data
    formData.restaurantCity=prefill.city;
    formData.locationType=prefill.type;
  }
  document.getElementById('sbTier').textContent=`TIER: ${tier.toUpperCase()}`;
}
loadPrefill();

// ═══ STEP DEFINITIONS ═══
const STEPS=[
  {id:'concept',title:'CONCEPT & BASICS',sub:'Definisikan konsep dasar restoran Anda',icon:'1'},
  {id:'market',title:'MARKET ANALYSIS',sub:'Analisis target pasar dan kompetitor',icon:'2'},
  {id:'financial',title:'FINANCIAL MODEL',sub:'Proyeksi keuangan & kalkulasi investasi',icon:'3'},
  {id:'menu',title:'MENU DESIGN',sub:'Rancang menu dan engineering matrix',icon:'4'},
  {id:'space',title:'SPACE DESIGN',sub:'Perencanaan ruang dan desain interior',icon:'5'},
  {id:'team',title:'OPERATIONS & TEAM',sub:'Struktur tim dan kalkulasi payroll',icon:'6'},
  {id:'launch',title:'LAUNCH STRATEGY',sub:'Strategi pemasaran dan grand opening',icon:'7'},
  {id:'results',title:'RESULTS & DOCUMENTS',sub:'Hasil analisis lengkap dan dokumen',icon:'8'},
];

// ═══ SIDEBAR ═══
function buildSidebar(){
  document.getElementById('spBar').innerHTML=Array.from({length:8},(_,i)=>{
    const cls=i<currentStep?'done':i===currentStep?'on':'';
    return`<div class="sp-dot ${cls}"></div>`;
  }).join('');
  document.getElementById('spNum').textContent=`STEP ${currentStep+1}/8`;

  const locText=prefill.city?`${prefill.city} · ${(prefill.zone||'').split('·')[0].trim()}`:'Belum ada lokasi';
  document.getElementById('sbSub').textContent=locText;

  document.getElementById('stepList').innerHTML=STEPS.map((s,i)=>{
    const cls=i<currentStep?'done':i===currentStep?'on':i>currentStep?'':'' ;
    return`<div class="step-item ${cls}" onclick="jumpStep(${i})">
      <div class="si-num">${i<currentStep?'✓':s.icon}</div>
      <div class="si-info">
        <div class="si-title">${s.title}</div>
        <div class="si-status">${i<currentStep?'SELESAI':i===currentStep?'AKTIF':'—'}</div>
      </div>
    </div>`;
  }).join('');
}

function jumpStep(i){if(i<=currentStep)setStep(i);}

// ═══ STEP NAVIGATION ═══
function goStep(dir){
  const next=currentStep+dir;
  if(next<0||next>7)return;
  currentStep=next;
  setStep(currentStep);
}

function setStep(idx){
  currentStep=idx;
  buildSidebar();
  const s=STEPS[idx];
  document.getElementById('shNum').textContent=`STEP ${idx+1} OF 8`;
  document.getElementById('shTitle').textContent=s.title;
  document.getElementById('shSub').textContent=s.sub;
  document.getElementById('btnBack').style.display=idx>0?'block':'none';
  document.getElementById('sfProgress').textContent=`Step ${idx+1} dari 8`;

  const isLast=idx===7;
  const btnNext=document.getElementById('btnNext');
  btnNext.textContent=isLast?'SELESAI ✓':'LANJUT →';
  btnNext.className=`btn-nav ${isLast?'btn-finish':'btn-next'}`;

  const body=document.getElementById('stepBody');
  const results=document.getElementById('resultsPage');

  if(idx===7){
    body.style.display='none';
    results.style.display='block';
    results.classList.add('on');
    document.getElementById('btnNext').style.display='none';
    renderResults();
  } else {
    body.style.display='block';
    results.style.display='none';
    results.classList.remove('on');
    document.getElementById('btnNext').style.display='block';
    renderStep(idx);
  }

  updateLivePanel(idx);
}

// ═══ STEP CONTENT ═══
function renderStep(idx){
  const body=document.getElementById('stepBody');
  switch(idx){
    case 0: body.innerHTML=stepConcept(); break;
    case 1: body.innerHTML=stepMarket(); break;
    case 2: body.innerHTML=stepFinancial(); attachFinancialListeners(); break;
    case 3: body.innerHTML=stepMenu(); buildMenuTable(); break;
    case 4: body.innerHTML=stepSpace(); break;
    case 5: body.innerHTML=stepTeam(); attachTeamListeners(); break;
    case 6: body.innerHTML=stepLaunch(); break;
  }
}

// ── STEP 1 ──
function stepConcept(){
  const city=prefill.city||'';

function getFinancials(){
  const seating=formData.seating||60;
  const concept=formData.concept||'casual';
  const costPerSeat={fine_dining:25,casual:15,quick_service:10,food_truck:5,cloud_kitchen:8};
  const capital=seating*(costPerSeat[concept]||15)*1e6;
  const avgCheck=formData.avgCheck||75000;
  const cogs=(formData.cogsPct||35)/100;
  const ramp=[.5,.5,.5,.6,.6,.6,.75,.75,.75,1,1,1];
  const covers=seating*0.7*1.8;
  const monthlyRevBase=covers*26*avgCheck;
  const yr=Array.from({length:5},(_,yr)=>{
    const mRevs=Array.from({length:12},(_,m)=>monthlyRevBase*(m<ramp.length?ramp[m]:1)*(1+yr*.05));
    const revenue=mRevs.reduce((a,b)=>a+b,0);
    const cogsTotal=revenue*cogs;
    const grossProfit=revenue-cogsTotal;
    const opex=revenue*.35;
    const ebitda=grossProfit-opex;
    return{yr:yr+1,revenue,cogsTotal,grossProfit,ebitda,margin:ebitda/revenue*100};
  });
  const personal=formData.personalInv||capital*0.5;
  const loan=formData.loan||capital*0.5;
  const yr1NetProfit=yr[0].ebitda;
  const roi=yr1NetProfit/capital*100;
  let irr=0;
  try{
    const cf=[-capital,...yr.map(y=>y.ebitda)];
    let r=0.1;
    for(let i=0;i<50;i++){const npv=cf.reduce((s,c,t)=>s+c/Math.pow(1+r,t),0);const dnpv=cf.reduce((s,c,t)=>t>0?s-t*c/Math.pow(1+r,t+1):s,0);if(Math.abs(dnpv)<1e-10)break;r=r-npv/dnpv;}
    irr=r*100;
  }catch(e){}
  let be=0;let cum=0;
  for(let m=0;m<60;m++){const mRev=monthlyRevBase*(m<12?ramp[Math.min(m,11)]:1)*(1+Math.floor(m/12)*.05);cum+=mRev*(1-cogs)-(mRev*.35);if(cum>=0&&be===0)be=m+1;}
  return{capital,yr1Revenue:yr[0].revenue,yr1EBITDA:yr[0].ebitda,roi,irr,be,yr,monthlyRevBase,covers};
}

function updateKUR(){
  const P=(parseFloat(document.getElementById('kur_amt')?.value||500))*1e6;
  const r=parseFloat(document.getElementById('kur_type')?.value||6)/100/12;
  const n=parseFloat(document.getElementById('kur_tenor')?.value||3)*12;
  if(!P||!r||!n)return;
  const monthly=P*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
  const totalPay=monthly*n;
  const interest=totalPay-P;
  const ebitdaMo=getFinancials().yr1EBITDA/12;
  const dcr=ebitdaMo/monthly;
  document.getElementById('kur_amtlbl').textContent=fmtRp(P/1e6);
  document.getElementById('kur_tenlbl').textContent=(n/12)+' thn';
  const dcrCol=dcr>=1.5?'var(--pos)':dcr>=1.0?'var(--a)':'var(--neg)';
  const dcrTxt=dcr>=1.5?'AMAN':dcr>=1.0?'HATI-HATI':'RISIKO';
  document.getElementById('kurMetrics').innerHTML=
    `<div style="background:var(--bg3);border:1px solid var(--b);padding:7px"><div style="font-size:7px;color:var(--t3);letter-spacing:1px;margin-bottom:2px">CICILAN/BLN</div><div style="font-family:'Orbitron',sans-serif;font-size:11px;color:var(--a)">${fmtRp(monthly/1e6)}</div></div>

function buildMenuTable(){
  document.getElementById('menuWrap').innerHTML=`<table class="menu-table"><thead><tr><th>Nama Item</th><th style="width:110px">Kategori</th><th style="width:100px">Harga (IDR)</th><th style="width:70px">COGS %</th><th style="width:30px"></th></tr></thead><tbody id="menuTbody"></tbody></table>`;
  menuItems.forEach((_,i)=>renderMenuRow(i));
  updateMenuStats();
}
function renderMenuRow(i){
  const it=menuItems[i];
  const cats=['starter','main','dessert','beverage'];
  const el=document.createElement('tr');
  el.innerHTML=`<td><input value="${it.n}" oninput="menuItems[${i}].n=this.value;updateMenuStats()"></td>
  <td><select onchange="menuItems[${i}].cat=this.value;updateMenuStats()">${cats.map(c=>`<option${it.cat===c?' selected':''}>${c}</option>`).join('')}</select></td>
  <td><input type="number" value="${it.price}" oninput="menuItems[${i}].price=+this.value;updateMenuStats()"></td>
  <td><input type="number" value="${it.cogs}" min="10" max="80" oninput="menuItems[${i}].cogs=+this.value;updateMenuStats()"></td>
  <td><button class="btn-icon" onclick="removeMenuItem(${i})">×</button></td>`;
  document.getElementById('menuTbody').appendChild(el);
}
function addMenuItem(){menuItems.push({n:'Item Baru',cat:'main',price:50000,cogs:30});buildMenuTable();}
function removeMenuItem(i){if(menuItems.length>2){menuItems.splice(i,1);buildMenuTable();}}
function updateMenuStats(){
  const avgCM=menuItems.reduce((s,m)=>s+m.price*(1-m.cogs/100),0)/menuItems.length;
  const avgPrice=menuItems.reduce((s,m)=>s+m.price,0)/menuItems.length;
  const avgCogs=menuItems.reduce((s,m)=>s+m.cogs,0)/menuItems.length;
  const ms=document.getElementById('menuStats');
  if(ms)ms.innerHTML=[['ITEM COUNT',menuItems.length,''],['AVG COGS',avgCogs.toFixed(1)+'%',''],['AVG CM','Rp'+(avgCM/1000).toFixed(0)+'K',''],['AVG PRICE','Rp'+(avgPrice/1000).toFixed(0)+'K','']].map(([l,v])=>`<div style="background:var(--bg3);border:1px solid var(--b);padding:7px"><div style="font-size:7px;color:var(--t3);letter-spacing:1px;margin-bottom:2px">${l}</div><div style="font-family:'Orbitron',sans-serif;font-size:12px;color:var(--a)">${v}</div></div>`).join('');
  // Matrix
  const mm=document.getElementById('menuMatrix');
  if(!mm)return;
  const stars=[],plows=[],puzzles=[],dogs=[];
  for(const m of menuItems){
    const pop=m.price/avgPrice;const cm=m.price*(1-m.cogs/100);
    if(pop>=1&&cm>=avgCM)stars.push(m.n);
    else if(pop>=1&&cm<avgCM)plows.push(m.n);
    else if(pop<1&&cm>=avgCM)puzzles.push(m.n);
    else dogs.push(m.n);
  }
  const q=(items,label,color,border)=>`<div style="border:1px solid ${border};padding:7px;background:${color}"><div style="font-size:7px;letter-spacing:1.5px;color:${border};margin-bottom:4px">${label}</div>${items.map(n=>`<div style="font-size:8px;color:var(--t2)">${n}</div>`).join('')||'<div style="font-size:8px;color:var(--t4)">— kosong —</div>'}</div>`;
  mm.innerHTML=q(puzzles,'Puzzles','rgba(77,166,255,.04)','#4DA6FF')+q(stars,'Stars ★','rgba(105,240,174,.04)','var(--pos)')+q(dogs,'Dogs','rgba(255,82,82,.04)','var(--neg)')+q(plows,'Plowhorses','rgba(255,109,0,.04)','var(--a)');
  updateLivePanel(3);
}

function checkSpaceRatio(){
  const t=formData.totalArea,d=formData.diningArea,k=formData.kitchenArea;
  const el=document.getElementById('spaceRatioMsg');
  if(!el)return;
  if(t&&d&&k){
