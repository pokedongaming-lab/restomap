<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RestoBuilder — RestoSuite</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#081018;--bg2:#101a25;--bg3:#162232;--panel:#132030;--b:rgba(255,109,0,.22);--b2:rgba(255,109,0,.45);--a:#FF6D00;--a2:#FF8F00;--a3:rgba(255,109,0,.10);--t:#FFD08A;--t2:#FFB14A;--t3:rgba(255,208,138,.86);--t4:rgba(255,208,138,.58);--pos:#69F0AE;--neg:#FF5252;--info:#4DA6FF;}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t);font-family:'Share Tech Mono',monospace;font-size:11px}
.tb{display:flex;align-items:center;height:38px;background:var(--bg2);border-bottom:1px solid var(--b2)}
.tb-logo{padding:0 14px;height:100%;border-right:1px solid var(--b)}
.logo-t{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--a);letter-spacing:3px}
.logo-s{font-size:8px;color:var(--t3)}
.nav-links{display:flex;height:100%;border-right:1px solid var(--b)}
.nl{padding:0 16px;height:100%;display:flex;align-items:center;font-size:10px;cursor:pointer;color:var(--t3);border-right:1px solid var(--b)}
.nl:hover{color:var(--t);background:var(--a3)}
.nl.active{color:var(--a);border-bottom:2px solid var(--a)}
.tb-dot{width:6px;height:6px;border-radius:50%;background:var(--a);animation:blink 1.4s infinite;margin:0 5px}
.tb-status{font-size:9px;color:var(--t3);padding:0 12px;border-right:1px solid var(--b)}
.tb-clock{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--a);padding:0 12px;border-right:1px solid var(--b);letter-spacing:1px}
.spacer{flex:1}
.lang-grp{display:flex;align-items:center;gap:4px;padding:0 10px;border-left:1px solid var(--b)}
.lang-btn{font-size:9px;cursor:pointer;padding:2px 6px;border:1px solid var(--b);color:var(--t3);background:none}
.lang-btn.on{background:var(--a);border-color:var(--a);color:#000}
.theme-grp{display:flex;align-items:center;gap:5px;padding:0 12px}
.tc{width:13px;height:13px;border-radius:2px;cursor:pointer;border:1px solid transparent}
.tc:hover,.tc.on{border-color:var(--t);transform:scale(1.2)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.12}}

.app{display:flex;height:calc(100vh - 38px)}
.sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--b);display:flex;flex-direction:column}
.step-list{padding:8px 0;flex:1;overflow-y:auto}
.step-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .2s}
.step-item:hover{background:var(--a3)}
.step-item.on{border-left-color:var(--a);background:var(--a3)}
.step-item.done{border-left-color:var(--pos)}
.si-num{font-family:'Orbitron',sans-serif;font-size:9px;width:20px;height:20px;border-radius:50%;border:1px solid var(--b);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-item.on .si-num{border-color:var(--a);color:var(--a)}
.step-item.done .si-num{border-color:var(--pos);color:var(--pos)}
.si-title{font-size:10px;color:var(--t3);letter-spacing:.5px}
.step-item.on .si-title{color:var(--a)}
.step-item.done .si-title{color:var(--pos)}
.si-status{font-size:8px;color:var(--t4)}
.si-method{font-size:8px;color:var(--info);opacity:.9;margin-top:2px}
.sb-footer{padding:12px;border-top:1px solid var(--b)}
.btn-nav{width:100%;padding:12px;background:var(--a);border:none;color:#000;font-size:10px;font-weight:bold;cursor:pointer;margin-top:8px}
.btn-back{width:100%;padding:10px;background:transparent;border:1px solid var(--a);color:var(--a);font-size:10px;cursor:pointer}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.step-header{padding:14px 20px;border-bottom:1px solid var(--b);background:var(--bg2)}
.sh-num{font-size:8px;color:var(--t4);letter-spacing:2px;margin-bottom:3px}
.sh-title{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--a);letter-spacing:2px}
.sh-sub{font-size:9px;color:var(--t3);margin-top:3px}
.step-body{flex:1;overflow-y:auto;padding:20px}

.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.form-grid.cols3{grid-template-columns:repeat(3,1fr)}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.span2{grid-column:span 2}
.fl{font-size:8px;color:var(--t3);letter-spacing:1px;text-transform:uppercase}
.fi{background:var(--bg3);border:1px solid var(--b);color:var(--t);padding:10px;font-family:inherit;font-size:11px;outline:none;width:100%}
.fi:focus{border-color:var(--a)}
select.fi option{background:var(--bg3)}
.btn-add{background:var(--a3);border:1px solid var(--b2);color:var(--a);padding:8px 12px;cursor:pointer;font-size:9px;font-family:inherit;letter-spacing:1px;margin-top:8px;width:100%}
.btn-add:hover{background:var(--a);color:#000}

.section-title{font-size:10px;color:var(--t4);letter-spacing:2px;text-transform:uppercase;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--b)}

.ai-box{background:var(--a3);border:1px solid var(--b);padding:12px;margin-top:12px;border-radius:4px}
.ai-title{font-size:9px;color:var(--a);letter-spacing:1px;margin-bottom:8px}
.ai-content{font-size:10px;color:var(--t3);line-height:1.8}
.ai-btn{background:var(--a);border:none;color:#000;padding:8px 16px;font-size:9px;font-weight:bold;cursor:pointer;margin-top:10px}

.menu-table{width:100%;border-collapse:collapse;margin-bottom:8px}
.menu-table th{font-size:8px;color:var(--t3);letter-spacing:1px;padding:8px 6px;border-bottom:1px solid var(--b);text-align:left;text-transform:uppercase}
.menu-table td{padding:6px;border-bottom:1px solid var(--b)}
.menu-table td input,.menu-table td select{background:var(--bg3);border:1px solid var(--b);color:var(--t);padding:6px 8px;font-family:inherit;font-size:10px;width:100%;outline:none}
.menu-table td input:focus,.menu-table td select:focus{border-color:var(--a)}

.metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.metric-box{background:var(--bg3);border:1px solid var(--b);padding:12px}
.mb-label{font-size:8px;color:var(--t3);margin-bottom:4px}
.mb-val{font-family:'Orbitron',sans-serif;font-size:18px;color:var(--t)}
.mb-val.pos{color:var(--pos)}
.mb-val.neg{color:var(--neg)}

.result-card{background:var(--bg3);border:1px solid var(--b);padding:16px;margin-bottom:12px;border-radius:4px}
.rc-title{font-size:11px;color:var(--a);margin-bottom:10px;letter-spacing:1px}
.rc-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--b)}
.rc-label{font-size:10px;color:var(--t3)}
.rc-value{font-size:10px;color:var(--t);font-weight:bold}

.btn-export{background:var(--pos);border:none;color:#000;padding:12px 24px;font-size:11px;font-weight:bold;cursor:pointer;margin:8px 4px}
.btn-export:hover{opacity:0.9}

/* THEMES */
.th-dgrey{--bg:#111827;--bg2:#1f2937;--bg3:#374151;--panel:#1f2937;--b:rgba(148,163,184,.30);--b2:rgba(148,163,184,.55);--a:#f59e0b;--t:#f3f4f6;--t3:rgba(243,244,246,.86);--t4:rgba(243,244,246,.55)}
.th-grey{--bg:#1f2937;--bg2:#334155;--bg3:#475569;--panel:#334155;--b:rgba(203,213,225,.28);--b2:rgba(203,213,225,.5);--a:#fb923c;--t:#f8fafc;--t3:rgba(248,250,252,.86);--t4:rgba(248,250,252,.55)}
.th-navy{--bg:#081018;--bg2:#101a25;--bg3:#162232;--panel:#132030;--b:rgba(255,109,0,.22);--b2:rgba(255,109,0,.45);--a:#FF6D00;--t:#FFD08A;--t3:rgba(255,208,138,.86);--t4:rgba(255,208,138,.58)}
.th-blue{--bg:#0f172a;--bg2:#1e3a8a;--bg3:#1e40af;--panel:#1e3a8a;--b:rgba(147,197,253,.28);--b2:rgba(147,197,253,.55);--a:#60a5fa;--t:#e0f2fe;--t3:rgba(224,242,254,.88);--t4:rgba(224,242,254,.58)}
.th-matrix{--bg:#000500;--bg2:#000a00;--bg3:#001100;--panel:#000a00;--b:rgba(0,255,65,.14);--b2:rgba(0,255,65,.4);--a:#00FF41;--t:#00E676;--t3:rgba(0,230,118,.85);--t4:rgba(0,230,118,.52)}
.th-arctic{--bg:#000B14;--bg2:#001122;--bg3:#001a2e;--panel:#001122;--b:rgba(0,229,255,.14);--b2:rgba(0,229,255,.4);--a:#00E5FF;--t:#80DEEA;--t3:rgba(128,222,234,.85);--t4:rgba(128,222,234,.52)}
.th-ember{--bg:#0D0000;--bg2:#150000;--bg3:#220000;--panel:#150000;--b:rgba(255,61,0,.16);--b2:rgba(255,61,0,.42);--a:#FF3D00;--t:#FFAB91;--t3:rgba(255,171,145,.85);--t4:rgba(255,171,145,.52)}
</style>
</head>
<body>

<div class="tb">
  <div class="tb-logo">
    <div class="logo-t">RestoSuite</div>
    <div class="logo-s">BUILDER v2.0</div>
  </div>
  <div class="nav-links">
    <a class="nl" href="restomap.html">← RestoMap</a>
    <div class="nl active">RestoBuilder</div>
  </div>
  <div class="tb-dot"></div>
  <div class="tb-status" id="locationInfo">LOKASI: —</div>
  <div class="tb-clock" id="clock">--:--:--</div>
  <div class="spacer"></div>
  <div class="lang-grp">
    <button class="lang-btn on" id="btnLangID" onclick="setLangBuilder('id')">ID</button>
    <button class="lang-btn" id="btnLangEN" onclick="setLangBuilder('en')">EN</button>
  </div>
  <div class="theme-grp">
    <div class="tc" data-theme="th-dgrey" style="background:#1f2937" onclick="setThemeBuilder('th-dgrey', this)" title="Dark Grey"></div>
    <div class="tc" data-theme="th-grey" style="background:#334155" onclick="setThemeBuilder('th-grey', this)" title="Grey"></div>
    <div class="tc on" data-theme="th-navy" style="background:#1e3a5f" onclick="setThemeBuilder('th-navy', this)" title="Navy"></div>
    <div class="tc" data-theme="th-blue" style="background:#1d4ed8" onclick="setThemeBuilder('th-blue', this)" title="Blue"></div>
    <div class="tc" data-theme="th-matrix" style="background:#00FF41" onclick="setThemeBuilder('th-matrix', this)" title="Matrix (Legacy)"></div>
    <div class="tc" data-theme="th-arctic" style="background:#00E5FF" onclick="setThemeBuilder('th-arctic', this)" title="Arctic (Legacy)"></div>
    <div class="tc" data-theme="th-ember" style="background:#FF3D00" onclick="setThemeBuilder('th-ember', this)" title="Ember (Legacy)"></div>
  </div>
</div>

<div class="app">
  <div class="sidebar">
    <div class="step-list" id="stepList"></div>
    <div class="sb-footer">
      <div style="font-size:8px;color:var(--t4);line-height:1.5;margin-bottom:8px">
        Research basis: ROB2N · Bayes Clustering · Bayesian MMM · MILP Budget · Geo Copilot · HHI Share
      </div>
      <div id="stdParamBox" style="background:var(--bg3);border:1px solid var(--b);padding:8px;margin-bottom:8px;font-size:8px;line-height:1.6;color:var(--t3)"></div>
      <button class="btn-back" id="btnBackMap" onclick="location.href='restomap.html'">← KEMBALI KE MAP</button>
    </div>
  </div>

  <div class="main">
    <div class="step-header">
      <div class="sh-num" id="stepNum">STEP 1</div>
      <div class="sh-title" id="stepTitle">CONCEPT & BASIC</div>
      <div class="sh-sub" id="stepSub">Define your restaurant concept</div>
    </div>
    <div class="step-body" id="stepBody"></div>
  </div>
</div>

<script>
// ═══ DATA FROM RESTOMAP ═══
const params = new URLSearchParams(window.location.search);
const locationData = {
  city: params.get('city') || 'Jakarta',
  lat: parseFloat(params.get('lat')) || -6.2088,
  lng: parseFloat(params.get('lng')) || 106.8234,
  radius: parseInt(params.get('radius')) || 1000,
  category: params.get('category') || 'restaurant',
  score: parseInt(params.get('score')) || 75,
  revenue: parseInt(params.get('revenue')) || 487000000,
};

const STANDARD_PARAMS = {
  bayes: 70,
  hhi: 55,
  voronoi: 60,
  cannibal: 12,
  mmm: 65,
  milp: 62,
  targetMarginPct: 18,
  targetPaybackMonths: 18,
  defaultRadiusM: 1000,
  defaultAvgCheck: 35000
};

const methodMetrics = {
  bayes: parseFloat(params.get('bayes')) || STANDARD_PARAMS.bayes,
  hhi: parseFloat(params.get('hhi')) || STANDARD_PARAMS.hhi,
  voronoi: parseFloat(params.get('voronoi')) || STANDARD_PARAMS.voronoi,
  cannibal: parseFloat(params.get('cannibal')) || STANDARD_PARAMS.cannibal,
  mmm: parseFloat(params.get('mmm')) || STANDARD_PARAMS.mmm,
  milp: parseFloat(params.get('milp')) || STANDARD_PARAMS.milp,
};

const incomingAssumptions = {
  seats: parseFloat(params.get('asSeats')) || null,
  turnover: parseFloat(params.get('asTurnover')) || null,
  avgCheck: parseFloat(params.get('asAvgCheck')) || null,
  cogs: parseFloat(params.get('asCogs')) || null,
  laborPct: parseFloat(params.get('asLaborPct')) || null,
  marketingPct: parseFloat(params.get('asMarketingPct')) || null,
  rentFactor: parseFloat(params.get('asRentFactor')) || null,
  capex: parseFloat(params.get('asCapex')) || null,
};

document.getElementById('locationInfo').textContent = '📍 LOKASI: ' + locationData.city.toUpperCase() + ' (' + locationData.lat.toFixed(2) + ', ' + locationData.lng.toFixed(2) + ')';

let lang = 'id';
let themeBuilder = localStorage.getItem('restosuite_theme') || 'th-navy';
function BL(idText, enText){ return lang === 'id' ? idText : enText; }

function setThemeBuilder(themeClass, el){
  themeBuilder = themeClass;
  document.body.className = themeClass;
  localStorage.setItem('restosuite_theme', themeClass || 'th-navy');
  document.querySelectorAll('.tc').forEach(x => {
    x.classList.toggle('on', (x.dataset.theme || '') === themeClass);
  });
  if (el) el.classList.add('on');
}

// ═══ STEPS - NEW ORDER ═══
const STEPS_ID = [
  { id: 1, title: 'Concept & Basic', sub: 'Pondasi dari RestoMap', method: 'Geo Copilot + baseline demand' },
  { id: 2, title: 'Market Analysis', sub: 'Validasi pasar & kompetisi', method: 'Cluster Bayes + HHI Share + Geo Analisa' },
  { id: 3, title: 'Menu Design', sub: 'Rancang menu + pricing', method: 'Avg cover positioning + AI menu assist' },
  { id: 4, title: 'Space Design', sub: 'Layout & lokasi properti', method: 'Voronoi catchment + Feng Shui + rent scan' },
  { id: 5, title: 'Operations & Team', sub: 'Struktur tim & payroll', method: 'Labor sizing + cost baseline' },
  { id: 6, title: 'Launch Strategy', sub: 'Go-to-market & influencer', method: 'Bayesian MMM + MILP budget allocation' },
  { id: 7, title: 'Financial Model', sub: 'Hitung skenario finansial', method: 'Posterior scenario + manual override' },
  { id: 8, title: 'Results & Documents', sub: 'Business plan profesional', method: 'Auto summary + export-ready doc' },
];
const STEPS_EN = [
  { id: 1, title: 'Concept & Basic', sub: 'Foundation from RestoMap', method: 'Geo Copilot + baseline demand' },
  { id: 2, title: 'Market Analysis', sub: 'Validate market & competition', method: 'Bayesian Clustering + HHI Share + Geo Analysis' },
  { id: 3, title: 'Menu Design', sub: 'Design menu & pricing', method: 'Avg-cover positioning + AI menu assist' },
  { id: 4, title: 'Space Design', sub: 'Layout & property search', method: 'Voronoi catchment + Feng Shui + rent scan' },
  { id: 5, title: 'Operations & Team', sub: 'Team structure & payroll', method: 'Labor sizing + cost baseline' },
  { id: 6, title: 'Launch Strategy', sub: 'Go-to-market & influencers', method: 'Bayesian MMM + MILP budget allocation' },
  { id: 7, title: 'Financial Model', sub: 'Compute financial scenarios', method: 'Posterior scenario + manual override' },
  { id: 8, title: 'Results & Documents', sub: 'Professional business plan', method: 'Auto summary + export-ready doc' },
];
const getSteps = () => (lang === 'id' ? STEPS_ID : STEPS_EN);

let currentStep = 1;

const CATEGORY_TO_CONCEPT = {
  restaurant: 'casual',
  cafe: 'coffee',
  coffee_shop: 'coffee',
  fast_food_restaurant: 'fastfood',
  indonesian_restaurant: 'casual',
  japanese_restaurant: 'casual',
  korean_restaurant: 'casual',
  chinese_restaurant: 'casual',
  seafood_restaurant: 'casual',
  steak_house: 'fine',
  pizza_restaurant: 'casual',
  bakery: 'coffee',
  dessert_shop: 'coffee',
  noodle_shop: 'casual',
  vegetarian_restaurant: 'casual'
};

const CATEGORY_TO_CUISINE = {
  indonesian_restaurant: 'indonesian',
  japanese_restaurant: 'japanese',
  korean_restaurant: 'korean',
  chinese_restaurant: 'chinese',
  seafood_restaurant: 'western',
  steak_house: 'western',
  pizza_restaurant: 'western',
  noodle_shop: 'indonesian',
  vegetarian_restaurant: 'western'
};

const CUISINE_BY_CATEGORY = {
  coffee_shop:['indonesian','western'],
  cafe:['indonesian','western'],
  fast_food_restaurant:['western','indonesian'],
  indonesian_restaurant:['indonesian'],
  japanese_restaurant:['japanese'],
  korean_restaurant:['korean'],
  chinese_restaurant:['chinese'],
  seafood_restaurant:['western','indonesian'],
  steak_house:['western'],
  pizza_restaurant:['western'],
  bakery:['western'],
  dessert_shop:['western'],
  noodle_shop:['indonesian','chinese'],
  vegetarian_restaurant:['western','indonesian'],
  restaurant:['indonesian','western','japanese','korean','chinese']
};

const DRINK_PRODUCT_DEFAULTS = {
  coffee:['Espresso','Latte','Americano','Manual Brew'],
  fastfood:['Soft Drink','Iced Tea','Mineral Water'],
  casual:['Tea','Juice','Mineral Water'],
  fine:['Mocktail','Tea Selection','Sparkling Water']
};

const conceptDefault = CATEGORY_TO_CONCEPT[locationData.category] || 'coffee';
let restaurantData = {
  concept: conceptDefault,
  cuisine: CATEGORY_TO_CUISINE[locationData.category] || 'indonesian',
  name: '', seating: incomingAssumptions.seats || 30, avgCheck: incomingAssumptions.avgCheck || 35000,
  turnover: incomingAssumptions.turnover || 2.2,
  assumptions: {
    cogs: incomingAssumptions.cogs || 0.36,
    laborPct: incomingAssumptions.laborPct || 0.18,
    marketingPct: incomingAssumptions.marketingPct || 0.06,
    rentFactor: incomingAssumptions.rentFactor || 1.0,
    capex: incomingAssumptions.capex || 450000000
  },
  drinks: DRINK_PRODUCT_DEFAULTS[conceptDefault] || DRINK_PRODUCT_DEFAULTS.casual,
  products: ['Dessert','Merchandise','Bundling Package'],
  menuItems: [], spaceArea: 80, kitchenArea: 25,
  staff: { gm: 1, chef: 2, server: 3 },
  salaries: { gm: 15000000, chef: 8000000, server: 4500000 },
  marketingBudget: 5000000, influencers: [],
};

let builderModel = {
  source: {
    location: locationData,
    methods: methodMetrics,
    assumptions: incomingAssumptions
  },
  conceptBasic: restaurantData,
  marketAnalysis: {},
  menuDesign: {},
  spaceDesign: {},
  operations: {},
  launch: {},
  financial: {},
  output: {}
};

function renderSidebar() {
  const list = document.getElementById('stepList');
  const steps = getSteps();
  list.innerHTML = steps.map(s => `
    <div class="step-item ${s.id === currentStep ? 'on' : ''} ${s.id < currentStep ? 'done' : ''}" onclick="goToStep(${s.id})">
      <div class="si-num">${s.id < currentStep ? '✓' : s.id}</div>
      <div><div class="si-title">${s.title}</div><div class="si-status">${s.sub}</div><div class="si-method">${s.method || ''}</div></div>
    </div>
  `).join('');
}

function renderStandardParams(){
  const box = document.getElementById('stdParamBox');
  if(!box) return;
  box.innerHTML = `
    <div style="color:var(--a);margin-bottom:4px">${BL('PARAMETER STANDAR','STANDARD PARAMETERS')}</div>
    <div>Bayes: <strong>${STANDARD_PARAMS.bayes}</strong> · HHI: <strong>${STANDARD_PARAMS.hhi}</strong></div>
    <div>Voronoi: <strong>${STANDARD_PARAMS.voronoi}</strong> · Cannibal: <strong>${STANDARD_PARAMS.cannibal}%</strong></div>
    <div>MMM: <strong>${STANDARD_PARAMS.mmm}</strong> · MILP: <strong>${STANDARD_PARAMS.milp}</strong></div>
    <div>${BL('Target Margin','Target Margin')}: <strong>${STANDARD_PARAMS.targetMarginPct}%</strong> · ${BL('Payback','Payback')}: <strong>${STANDARD_PARAMS.targetPaybackMonths} ${BL('bulan','months')}</strong></div>
  `;
}

function setLangBuilder(nextLang){
  lang = nextLang;
  document.getElementById('btnLangID').className = nextLang === 'id' ? 'lang-btn on' : 'lang-btn';
  document.getElementById('btnLangEN').className = nextLang === 'en' ? 'lang-btn on' : 'lang-btn';
  document.getElementById('locationInfo').textContent = (nextLang === 'id' ? '📍 LOKASI: ' : '📍 LOCATION: ') + locationData.city.toUpperCase() + ' (' + locationData.lat.toFixed(2) + ', ' + locationData.lng.toFixed(2) + ')';
  const btnBack = document.getElementById('btnBackMap');
  if (btnBack) btnBack.textContent = BL('← KEMBALI KE MAP', '← BACK TO MAP');
  renderStandardParams();
  renderStep();
}

function renderStep() {
  renderStandardParams();
  const steps = getSteps();
  document.getElementById('stepNum').textContent = 'STEP ' + currentStep;
  document.getElementById('stepTitle').textContent = steps[currentStep-1].title;
  document.getElementById('stepSub').textContent = steps[currentStep-1].sub + ' • ' + (steps[currentStep-1].method || '');
  const body = document.getElementById('stepBody');
  switch(currentStep) {
    case 1: renderStep1(body); break;
    case 2: renderStep2(body); break;
    case 3: renderStep3(body); break;
    case 4: renderStep4(body); break;
    case 5: renderStep5(body); break;
    case 6: renderStep6(body); break;
    case 7: renderStep7(body); break;
    case 8: renderStep8(body); break;
  }
  renderSidebar();
}

function nextStep() { if(currentStep < 8) { currentStep++; renderStep(); }}
function goToStep(n) { currentStep = n; renderStep(); }

// STEP 2: MARKET ANALYSIS
function renderStep2(body) {
  const standards = { bayes: 70, hhi: 55, voronoi: 60, cannibal: 12, mmm: 65, milp: 62 };
  const values = {
    bayes: methodMetrics.bayes,
    hhi: methodMetrics.hhi,
    voronoi: methodMetrics.voronoi,
    cannibal: methodMetrics.cannibal,
    mmm: methodMetrics.mmm,
    milp: methodMetrics.milp,
  };

  const objectiveScore = Math.round(
    values.bayes * 0.26 +
    (100 - values.hhi) * 0.18 +
    values.voronoi * 0.18 +
    (100 - values.cannibal * 2) * 0.12 +
    values.mmm * 0.14 +
    values.milp * 0.12
  );

  const row = (key, label, isLowerBetter = false) => {
    const val = values[key];
    const std = standards[key];
    const better = isLowerBetter ? val <= std : val >= std;
    const delta = (val - std).toFixed(1);
    const bar = Math.max(0, Math.min(100, isLowerBetter ? (100 - val) : val));
    return `
      <div style="background:var(--bg3);border:1px solid var(--b);padding:8px;border-radius:6px;margin-bottom:7px">
        <div style="display:flex;justify-content:space-between;align-items:center;font-size:9px;color:var(--t3);margin-bottom:4px">
          <span>${label}</span>
          <span><strong>${val.toFixed(1)}</strong> / Std ${std} · <span style="color:${better?'var(--pos)':'var(--neg)'}">${delta >= 0 ? '+' : ''}${delta}</span></span>
        </div>
        <div style="height:7px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden">
          <div style="height:100%;width:${bar}%;background:${better?'#22c55e':'#f97316'}"></div>
        </div>
      </div>
    `;
  };

  const objectiveLabel = objectiveScore >= 78 ? BL('SANGAT MENARIK','HIGHLY ATTRACTIVE') : objectiveScore >= 62 ? BL('MENARIK','ATTRACTIVE') : BL('PERLU VALIDASI','NEEDS VALIDATION');

  builderModel.marketAnalysis = {
    objectiveScore,
    standards,
    values,
    verdict: objectiveLabel
  };

  body.innerHTML = `
    <div class="metrics-grid">
      <div class="metric-box"><div class="mb-label">${BL('OBJECTIVE MARKET SCORE','OBJECTIVE MARKET SCORE')}</div><div class="mb-val" style="color:var(--a)">${objectiveScore}</div></div>
      <div class="metric-box"><div class="mb-label">${BL('VS STANDARD','VS STANDARD')}</div><div class="mb-val">${objectiveLabel}</div></div>
      <div class="metric-box"><div class="mb-label">${BL('CITY','CITY')}</div><div class="mb-val">${locationData.city}</div></div>
    </div>

    <div class="section-title">📊 ${BL('MARKET INFOGRAFIS INTERAKTIF','INTERACTIVE MARKET INFOGRAPHICS')}</div>
    ${row('bayes', 'Bayes Demand')}
    ${row('hhi', 'HHI Competition', true)}
    ${row('voronoi', 'Voronoi Gap')}
    ${row('cannibal', 'Cannibal Overlap', true)}
    ${row('mmm', 'MMM Efficiency')}
    ${row('milp', 'MILP Feasibility')}

    <div class="form-grid">
      <div class="fg"><div class="fl">${BL('TARGET MARKET','TARGET MARKET')}</div><select class="fi"><option>${BL('Urban Professional','Urban Professional')}</option><option>${BL('Keluarga','Family')}</option></select></div>
      <div class="fg"><div class="fl">${BL('TREN','TREND')}</div><select class="fi"><option>${BL('Bertumbuh','Growing')}</option><option>${BL('Stabil','Stable')}</option></select></div>
    </div>

    <div class="ai-box">
      <div class="ai-title">🤖 ${BL('AI MARKET INSIGHTS','AI MARKET INSIGHTS')}</div>
      <div class="ai-content">
        📈 ${locationData.city} ${BL('tren positif','has positive trend')}<br>
        🎯 ${BL('Objective score','Objective score')}: <strong>${objectiveScore}</strong> (${objectiveLabel})<br>
        🧠 ${BL('Model Bayes + HHI menunjukkan tekanan kompetisi','Bayes + HHI model indicates competition pressure')} <strong>${methodMetrics.hhi.toFixed(0)}</strong><br>
        🗺️ ${BL('Voronoi gap score','Voronoi gap score')}: <strong>${methodMetrics.voronoi.toFixed(0)}</strong><br>

function getMenuBlueprint(concept, avgCheck){
  if (concept === 'fastfood') return [
    {cat:'Main', count:6, ratio:1.00, cogs:34},
    {cat:'Side', count:5, ratio:0.55, cogs:32},
    {cat:'Drink', count:6, ratio:0.40, cogs:24}
  ];
  if (concept === 'fine') return [
    {cat:'Starter', count:5, ratio:0.70, cogs:36},
    {cat:'Main', count:8, ratio:1.25, cogs:38},
    {cat:'Dessert', count:5, ratio:0.80, cogs:33},
    {cat:'Beverage', count:6, ratio:0.55, cogs:26}
  ];
  if (concept === 'coffee') return [
    {cat:'Coffee', count:10, ratio:0.85, cogs:26},
    {cat:'Non-Coffee', count:8, ratio:0.80, cogs:27},
    {cat:'Food', count:8, ratio:0.95, cogs:34}
  ];
  return [
    {cat:'Main', count:10, ratio:1.00, cogs:35},
    {cat:'Drink', count:8, ratio:0.45, cogs:24},
    {cat:'Snack', count:7, ratio:0.65, cogs:31}
  ];
}

function generateMenuItems(){
  const avg = restaurantData.avgCheck || 35000;
  const bp = getMenuBlueprint(restaurantData.concept, avg);
  const items = [];
  bp.forEach((b) => {
    for (let i=1;i<=b.count;i++) {
      const price = Math.round((avg * b.ratio) / 1000) * 1000 + (i%3)*1000;
      items.push({
        name: `${b.cat} ${i}`,
        cat: b.cat,
        price,
        cogs: b.cogs
      });
    }
  });
  restaurantData.menuItems = items;
}

// STEP 7: FINANCIAL MODEL (CALCULATED FROM ALL ABOVE)
function renderStep7(body) {
  const rev = restaurantData.seating * restaurantData.avgCheck * 26 * 0.7;
  const cogs = rev * 0.30;
  const laborFactor = 0.9 + (methodMetrics.cannibal > 20 ? 0.15 : 0.05);
  const labor = Math.round(25000000 * laborFactor);
  const rent = restaurantData.spaceArea * 250000;
  const mmmFactor = Math.max(0.75, Math.min(1.25, methodMetrics.mmm / 70));
  const milpFactor = Math.max(0.75, Math.min(1.20, methodMetrics.milp / 70));
  const optimizedMarketing = Math.round(restaurantData.marketingBudget * mmmFactor * milpFactor);
  const opex = cogs + labor + rent + optimizedMarketing;
  const profit = rev - opex;
  body.innerHTML = `

function exportBusinessPlan(){
  const html = buildBusinessPlanHtml();
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `BusinessPlan_${(restaurantData.name || 'Resto').replace(/\s+/g,'_')}.html`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function shareBusinessPlan(){
  const summary = `Business Plan ${restaurantData.name || 'Resto'}\nCity: ${locationData.city}\nScore: ${locationData.score}/100\nConcept: ${restaurantData.concept}\nSeats: ${restaurantData.seating}`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(summary).then(() => {
      alert(BL('Ringkasan plan disalin. Tempel ke WhatsApp.', 'Plan summary copied. Paste into WhatsApp.'));
    }).catch(() => alert(summary));
  } else {
    alert(summary);
  }
}
