<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RestoBuilder — RestoSuite</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#030303;--bg2:#0a0a0a;--bg3:#111;--panel:#0d0d0d;--b:rgba(255,109,0,.15);--b2:rgba(255,109,0,.38);--a:#FF6D00;--a2:#FF8F00;--a3:rgba(255,109,0,.07);--t:#FFB74D;--t2:#FFA726;--t3:rgba(255,183,77,.45);--t4:rgba(255,183,77,.15);--pos:#69F0AE;--neg:#FF5252;--info:#4DA6FF;}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t);font-family:'Share Tech Mono',monospace;font-size:11px}
.tb{display:flex;align-items:center;height:38px;background:var(--bg2);border-bottom:1px solid var(--b2)}
.tb-logo{padding:0 14px;height:100%;border-right:1px solid var(--b)}
.logo-t{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--a);letter-spacing:3px}
.logo-s{font-size:8px;color:var(--t3)}
.nav-links{display:flex;height:100%;border-right:1px solid var(--b)}
.nl{padding:0 16px;height:100%;display:flex;align-items:center;font-size:10px;cursor:pointer;color:var(--t3);border-right:1px solid var(--b)}
.nl:hover{color:var(--t);background:var(--a3)}
.nl.active{color:var(--a);border-bottom:2px solid var(--a)}
.tb-dot{width:6px;height:6px;border-radius:50%;background:var(--a);animation:blink 1.4s infinite;margin:0 5px}
.tb-status{font-size:9px;color:var(--t3);padding:0 12px;border-right:1px solid var(--b)}
.tb-clock{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--a);padding:0 12px;border-right:1px solid var(--b);letter-spacing:1px}
.spacer{flex:1}
.lang-grp{display:flex;align-items:center;gap:4px;padding:0 10px;border-left:1px solid var(--b)}
.lang-btn{font-size:9px;cursor:pointer;padding:2px 6px;border:1px solid var(--b);color:var(--t3);background:none}
.lang-btn.on{background:var(--a);border-color:var(--a);color:#000}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.12}}

.app{display:flex;height:calc(100vh - 38px)}
.sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--b);display:flex;flex-direction:column}
.step-list{padding:8px 0;flex:1;overflow-y:auto}
.step-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .2s}
.step-item:hover{background:var(--a3)}
.step-item.on{border-left-color:var(--a);background:var(--a3)}
.step-item.done{border-left-color:var(--pos)}
.si-num{font-family:'Orbitron',sans-serif;font-size:9px;width:20px;height:20px;border-radius:50%;border:1px solid var(--b);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-item.on .si-num{border-color:var(--a);color:var(--a)}
.step-item.done .si-num{border-color:var(--pos);color:var(--pos)}
.si-title{font-size:10px;color:var(--t3);letter-spacing:.5px}
.step-item.on .si-title{color:var(--a)}
.step-item.done .si-title{color:var(--pos)}
.si-status{font-size:8px;color:var(--t4)}
.sb-footer{padding:12px;border-top:1px solid var(--b)}
.btn-nav{width:100%;padding:12px;background:var(--a);border:none;color:#000;font-size:10px;font-weight:bold;cursor:pointer;margin-top:8px}
.btn-back{width:100%;padding:10px;background:transparent;border:1px solid var(--a);color:var(--a);font-size:10px;cursor:pointer}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.step-header{padding:14px 20px;border-bottom:1px solid var(--b);background:var(--bg2)}
.sh-num{font-size:8px;color:var(--t4);letter-spacing:2px;margin-bottom:3px}
.sh-title{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--a);letter-spacing:2px}
.sh-sub{font-size:9px;color:var(--t3);margin-top:3px}
.step-body{flex:1;overflow-y:auto;padding:20px}

.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.form-grid.cols3{grid-template-columns:repeat(3,1fr)}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.span2{grid-column:span 2}
.fl{font-size:8px;color:var(--t3);letter-spacing:1px;text-transform:uppercase}
.fi{background:var(--bg3);border:1px solid var(--b);color:var(--t);padding:10px;font-family:inherit;font-size:11px;outline:none;width:100%}
.fi:focus{border-color:var(--a)}
select.fi option{background:var(--bg3)}
.btn-add{background:var(--a3);border:1px solid var(--b2);color:var(--a);padding:8px 12px;cursor:pointer;font-size:9px;font-family:inherit;letter-spacing:1px;margin-top:8px;width:100%}
.btn-add:hover{background:var(--a);color:#000}

.section-title{font-size:10px;color:var(--t4);letter-spacing:2px;text-transform:uppercase;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--b)}

.ai-box{background:var(--a3);border:1px solid var(--b);padding:12px;margin-top:12px;border-radius:4px}
.ai-title{font-size:9px;color:var(--a);letter-spacing:1px;margin-bottom:8px}
.ai-content{font-size:10px;color:var(--t3);line-height:1.8}
.ai-btn{background:var(--a);border:none;color:#000;padding:8px 16px;font-size:9px;font-weight:bold;cursor:pointer;margin-top:10px}

.menu-table{width:100%;border-collapse:collapse;margin-bottom:8px}
.menu-table th{font-size:8px;color:var(--t3);letter-spacing:1px;padding:8px 6px;border-bottom:1px solid var(--b);text-align:left;text-transform:uppercase}
.menu-table td{padding:6px;border-bottom:1px solid var(--b)}
.menu-table td input,.menu-table td select{background:var(--bg3);border:1px solid var(--b);color:var(--t);padding:6px 8px;font-family:inherit;font-size:10px;width:100%;outline:none}
.menu-table td input:focus,.menu-table td select:focus{border-color:var(--a)}

.metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.metric-box{background:var(--bg3);border:1px solid var(--b);padding:12px}
.mb-label{font-size:8px;color:var(--t3);margin-bottom:4px}
.mb-val{font-family:'Orbitron',sans-serif;font-size:18px;color:var(--t)}
.mb-val.pos{color:var(--pos)}
.mb-val.neg{color:var(--neg)}

.result-card{background:var(--bg3);border:1px solid var(--b);padding:16px;margin-bottom:12px;border-radius:4px}
.rc-title{font-size:11px;color:var(--a);margin-bottom:10px;letter-spacing:1px}
.rc-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--b)}
.rc-label{font-size:10px;color:var(--t3)}
.rc-value{font-size:10px;color:var(--t);font-weight:bold}

.btn-export{background:var(--pos);border:none;color:#000;padding:12px 24px;font-size:11px;font-weight:bold;cursor:pointer;margin:8px 4px}
.btn-export:hover{opacity:0.9}
</style>
</head>
<body>

<div class="tb">
  <div class="tb-logo">
    <div class="logo-t">RestoSuite</div>
    <div class="logo-s">BUILDER v2.0</div>
  </div>
  <div class="nav-links">
    <a class="nl" href="restomap.html">← RestoMap</a>
    <div class="nl active">RestoBuilder</div>
  </div>
  <div class="tb-dot"></div>
  <div class="tb-status" id="locationInfo">LOKASI: —</div>
  <div class="tb-clock" id="clock">--:--:--</div>
  <div class="spacer"></div>
  <div class="lang-grp">
    <button class="lang-btn on" id="btnLangID" onclick="setLangBuilder('id')">ID</button>
    <button class="lang-btn" id="btnLangEN" onclick="setLangBuilder('en')">EN</button>
  </div>
</div>

<div class="app">
  <div class="sidebar">
    <div class="step-list" id="stepList"></div>
    <div class="sb-footer">
      <button class="btn-back" id="btnBackMap" onclick="location.href='restomap.html'">← KEMBALI KE MAP</button>
    </div>
  </div>

  <div class="main">
    <div class="step-header">
      <div class="sh-num" id="stepNum">STEP 1</div>
      <div class="sh-title" id="stepTitle">CONCEPT & BASIC</div>
      <div class="sh-sub" id="stepSub">Define your restaurant concept</div>
    </div>
    <div class="step-body" id="stepBody"></div>
  </div>
</div>

<script>
// ═══ DATA FROM RESTOMAP ═══
const params = new URLSearchParams(window.location.search);
const locationData = {
  city: params.get('city') || 'Jakarta',
  lat: parseFloat(params.get('lat')) || -6.2088,
  lng: parseFloat(params.get('lng')) || 106.8234,
  radius: parseInt(params.get('radius')) || 1000,
  category: params.get('category') || 'coffee',
  score: parseInt(params.get('score')) || 75,
  revenue: parseInt(params.get('revenue')) || 487000000,
};

document.getElementById('locationInfo').textContent = '📍 LOKASI: ' + locationData.city.toUpperCase() + ' (' + locationData.lat.toFixed(2) + ', ' + locationData.lng.toFixed(2) + ')';

let lang = 'id';
function BL(idText, enText){ return lang === 'id' ? idText : enText; }

// ═══ STEPS - NEW ORDER ═══
const STEPS_ID = [
  { id: 1, title: 'Concept & Basic', sub: 'Dari RestoMap' },
  { id: 2, title: 'Market Analysis', sub: 'Dari RestoMap' },
  { id: 3, title: 'Menu Design', sub: 'AI Assist' },
  { id: 4, title: 'Space Design', sub: 'AI + Feng Shui' },
  { id: 5, title: 'Operations & Team', sub: 'AI Assist' },
  { id: 6, title: 'Launch Strategy', sub: 'AI Assist' },
  { id: 7, title: 'Financial Model', sub: 'Calculated / Manual' },
  { id: 8, title: 'Results & Documents', sub: 'Business Plan' },
];
const STEPS_EN = [
  { id: 1, title: 'Concept & Basic', sub: 'From RestoMap' },
  { id: 2, title: 'Market Analysis', sub: 'From RestoMap' },
  { id: 3, title: 'Menu Design', sub: 'AI Assist' },
  { id: 4, title: 'Space Design', sub: 'AI + Feng Shui' },
  { id: 5, title: 'Operations & Team', sub: 'AI Assist' },
  { id: 6, title: 'Launch Strategy', sub: 'AI Assist' },
  { id: 7, title: 'Financial Model', sub: 'Calculated / Manual' },
  { id: 8, title: 'Results & Documents', sub: 'Business Plan' },
];
const getSteps = () => (lang === 'id' ? STEPS_ID : STEPS_EN);

let currentStep = 1;
let restaurantData = {
  concept: 'coffee', cuisine: 'indonesian', name: '', seating: 30, avgCheck: 35000,
  menuItems: [], spaceArea: 80, kitchenArea: 25,
  staff: { gm: 1, chef: 2, server: 3 },
  salaries: { gm: 15000000, chef: 8000000, server: 4500000 },
  marketingBudget: 5000000, influencers: [],
};

function renderSidebar() {
  const list = document.getElementById('stepList');
  const steps = getSteps();
  list.innerHTML = steps.map(s => `
    <div class="step-item ${s.id === currentStep ? 'on' : ''} ${s.id < currentStep ? 'done' : ''}" onclick="goToStep(${s.id})">
      <div class="si-num">${s.id < currentStep ? '✓' : s.id}</div>
      <div><div class="si-title">${s.title}</div><div class="si-status">${s.sub}</div></div>
    </div>
  `).join('');
}

function setLangBuilder(nextLang){
  lang = nextLang;
  document.getElementById('btnLangID').className = nextLang === 'id' ? 'lang-btn on' : 'lang-btn';
  document.getElementById('btnLangEN').className = nextLang === 'en' ? 'lang-btn on' : 'lang-btn';
  document.getElementById('locationInfo').textContent = (nextLang === 'id' ? '📍 LOKASI: ' : '📍 LOCATION: ') + locationData.city.toUpperCase() + ' (' + locationData.lat.toFixed(2) + ', ' + locationData.lng.toFixed(2) + ')';
  const btnBack = document.getElementById('btnBackMap');
  if (btnBack) btnBack.textContent = BL('← KEMBALI KE MAP', '← BACK TO MAP');
  renderStep();
}

function renderStep() {
  const steps = getSteps();
  document.getElementById('stepNum').textContent = 'STEP ' + currentStep;
  document.getElementById('stepTitle').textContent = steps[currentStep-1].title;
  document.getElementById('stepSub').textContent = steps[currentStep-1].sub;
  const body = document.getElementById('stepBody');
  switch(currentStep) {
    case 1: renderStep1(body); break;
    case 2: renderStep2(body); break;
    case 3: renderStep3(body); break;
    case 4: renderStep4(body); break;
    case 5: renderStep5(body); break;
    case 6: renderStep6(body); break;
    case 7: renderStep7(body); break;
    case 8: renderStep8(body); break;
  }
  renderSidebar();
}

function nextStep() { if(currentStep < 8) { currentStep++; renderStep(); }}
function goToStep(n) { currentStep = n; renderStep(); }

// STEP 1: CONCEPT & BASIC
function renderStep1(body) {
  body.innerHTML = `
    <div class="form-grid">
      <div class="fg"><div class="fl">${BL('NAMA RESTORAN','RESTAURANT NAME')}</div><input class="fi" id="restoName" placeholder="${BL('Kedai Kopi Nusantara','Nusantara Coffee House')}" value="${restaurantData.name}" onchange="restaurantData.name=this.value"></div>
      <div class="fg">
        <div class="fl">${BL('KONSEP','CONCEPT')}</div>
        <select class="fi" onchange="restaurantData.concept=this.value">
          <option value="coffee" ${restaurantData.concept==='coffee'?'selected':''}>☕ Coffee & Cafe</option>
          <option value="fastfood">🍔 Fast Food</option>
          <option value="casual">🍽️ Casual Dining</option>
          <option value="fine">🍷 Fine Dining</option>
        </select>
      </div>
      <div class="fg">
        <div class="fl">${BL('JENIS MASAKAN','CUISINE TYPE')}</div>
        <select class="fi"><option>Indonesian</option><option>Western</option><option>Japanese</option><option>Korean</option><option>Chinese</option></select>
      </div>
      <div class="fg"><div class="fl">${BL('KURSI','SEATS')}</div><input type="number" class="fi" value="${restaurantData.seating}" onchange="restaurantData.seating=parseInt(this.value)"></div>
    </div>
    <div class="section-title">💰 ${BL('AVG CHECK (DARI RESTOMAP)','AVG CHECK (FROM RESTOMAP)')}</div>
    <div class="form-grid">
      <div class="fg"><div class="fl">AVG CHECK (RP)</div><input type="number" class="fi" value="${restaurantData.avgCheck}" onchange="restaurantData.avgCheck=parseInt(this.value)"></div>
    </div>
    <div class="ai-box">
      <div class="ai-title">🤖 ${BL('AI - DARI DATA RESTOMAP','AI - FROM RESTOMAP DATA')}</div>
      <div class="ai-content">
        📍 ${BL('Lokasi','Location')}: <strong>${locationData.city}</strong><br>
        📊 Score: <strong style="color:var(--a)">${locationData.score}/100</strong><br>
        💰 ${BL('Revenue potensial','Potential revenue')}: <strong>Rp ${(locationData.revenue/1000000).toFixed(0)}JT/${BL('bulan','month')}</strong>
      </div>
    </div>
    <button class="btn-nav" onclick="nextStep()">${BL('LANJUT →','NEXT →')}</button>
  `;
}

// STEP 2: MARKET ANALYSIS
function renderStep2(body) {
  body.innerHTML = `
    <div class="metrics-grid">
      <div class="metric-box"><div class="mb-label">POPULASI</div><div class="mb-val">45K</div></div>
      <div class="metric-box"><div class="mb-label">TRAFFIC/JAM</div><div class="mb-val">2.5K</div></div>
      <div class="metric-box"><div class="mb-label">INCOME/TH</div><div class="mb-val">Rp 120JT</div></div>
    </div>
    <div class="form-grid">
      <div class="fg"><div class="fl">${BL('TARGET MARKET','TARGET MARKET')}</div><select class="fi"><option>${BL('Urban Professional','Urban Professional')}</option><option>${BL('Keluarga','Family')}</option></select></div>
      <div class="fg"><div class="fl">${BL('TREN','TREND')}</div><select class="fi"><option>${BL('Bertumbuh','Growing')}</option><option>${BL('Stabil','Stable')}</option></select></div>
    </div>
    <div class="ai-box">
      <div class="ai-title">🤖 ${BL('AI MARKET INSIGHTS','AI MARKET INSIGHTS')}</div>
      <div class="ai-content">
        📈 ${locationData.city} ${BL('tren positif','has positive trend')}<br>
        💰 ${BL('Daya beli di atas rata-rata','Purchasing power above average')}<br>
        🎯 ${BL('Rekomendasi','Recommendation')}: ${restaurantData.concept === 'coffee' ? 'Coffee culture' : 'Quality experience'}
      </div>
    </div>
    <button class="btn-nav" onclick="nextStep()">${BL('LANJUT KE MENU →','CONTINUE TO MENU →')}</button>
  `;
}

// STEP 3: MENU DESIGN (AI)
function renderStep3(body) {
  body.innerHTML = `
    <div class="section-title">☕ MENU (AI GENERATED)</div>
    <table class="menu-table">
      <tr><th>${BL('Nama','Name')}</th><th>${BL('Kat','Cat')}</th><th>${BL('Harga','Price')}</th><th>COGS%</th></tr>
      <tr><td><input placeholder="Espresso"></td><td><select><option>Coffee</option></select></td><td><input type="number" value="25000"></td><td><input type="number" value="30"></td></tr>
      <tr><td><input placeholder="Latte"></td><td><select><option>Coffee</option></select></td><td><input type="number" value="35000"></td><td><input type="number" value="25"></td></tr>
      <tr><td><input placeholder="Croissant"></td><td><select><option>Food</option></select></td><td><input type="number" value="28000"></td><td><input type="number" value="35"></td></tr>
    </table>
    <button class="btn-add">+ ${BL('TAMBAH ITEM','ADD ITEM')}</button>
    <div class="ai-box">
      <div class="ai-title">🤖 ${BL('AI MENU RECOMMENDATION','AI MENU RECOMMENDATION')}</div>
      <div class="ai-content">
        Based on avg check <strong>Rp ${(restaurantData.avgCheck/1000).toFixed(0)}K</strong>:<br>
        • Best sellers: Espresso, Latte, Cold Brew<br>
        • Price range: Rp 25K - 45K<br>
        • Food: 30% of offering
      </div>
      <button class="ai-btn">🎲 GENERATE AI MENU</button>
    </div>
    <button class="btn-nav" onclick="nextStep()">${BL('LANJUT KE SPACE →','CONTINUE TO SPACE →')}</button>
  `;
}

// STEP 4: SPACE DESIGN (AI + FENG SHUI)
function renderStep4(body) {
  body.innerHTML = `
    <div class="form-grid">
      <div class="fg"><div class="fl">${BL('TOTAL AREA (M²)','TOTAL AREA (M²)')}</div><input type="number" class="fi" value="${restaurantData.spaceArea}"></div>
      <div class="fg"><div class="fl">${BL('DAPUR (M²)','KITCHEN (M²)')}</div><input type="number" class="fi" value="${restaurantData.kitchenArea}"></div>
    </div>
    <div class="form-grid">
      <div class="fg"><div class="fl">${BL('SEWA/M²','RENT/M²')}</div><input type="text" class="fi" value="Rp 250,000" disabled></div>
      <div class="fg"><div class="fl">${BL('TOTAL SEWA','TOTAL RENT')}</div><input type="text" class="fi" value="Rp ${(restaurantData.spaceArea * 250000).toLocaleString()}" disabled></div>
    </div>
    <div class="ai-box">
      <div class="ai-title">🏠 ${BL('AI SPACE + FENG SHUI','AI SPACE + FENG SHUI')}</div>
      <div class="ai-content">
        <strong>${BL('Layout','Layout')}:</strong><br>
        • ${BL('Dapur: Utara (elemen api)','Kitchen: North (fire element)')}<br>
        • ${BL('Kasir: Dekat pintu masuk (wealth)','Cashier: Near entrance (wealth)')}<br>
        • ${BL('Area duduk: Timur (natural light)','Seating: East (natural light)')}<br><br>
        <strong>Feng Shui:</strong><br>
        • ${BL('Jaga area masuk tetap lega','Keep entrance clear')}<br>
        • ${BL('Tanaman: Tenggara','Plants: Southeast')}<br>
        • ${BL('Pencahayaan hangat','Warm lighting')}
      </div>
      <button class="ai-btn">🎲 ${BL('GENERATE LAYOUT AI','GENERATE AI LAYOUT')}</button>
    </div>
    <button class="btn-nav" onclick="nextStep()">${BL('LANJUT KE OPERATIONS →','CONTINUE TO OPERATIONS →')}</button>
  `;
}

// STEP 5: OPERATIONS (AI)
function renderStep5(body) {
  const s = restaurantData.seating;
  body.innerHTML = `
    <div class="section-title">👥 ${BL('REKOMENDASI TIM AI','AI TEAM RECOMMENDATION')}</div>
    <div class="form-grid">
      <div class="fg"><div class="fl">MANAGEMENT</div><input class="fi" value="1" disabled></div>
      <div class="fg"><div class="fl">CHEF</div><input class="fi" value="${Math.ceil(s/20)}" disabled></div>
      <div class="fg"><div class="fl">SERVER/FOH</div><input class="fi" value="${Math.ceil(s/10)}" disabled></div>
    </div>
    <div class="section-title">💰 SALARIES</div>
    <div class="form-grid">
      <div class="fg"><div class="fl">GM / ${BL('BULAN','MONTH')}</div><input class="fi" value="${restaurantData.salaries.gm}"></div>
      <div class="fg"><div class="fl">CHEF / ${BL('BULAN','MONTH')}</div><input class="fi" value="${restaurantData.salaries.chef}"></div>
      <div class="fg"><div class="fl">SERVER / ${BL('BULAN','MONTH')}</div><input class="fi" value="${restaurantData.salaries.server}"></div>
    </div>
    <div class="ai-box">
      <div class="ai-title">🤖 ${BL('REKOMENDASI TIM AI','AI TEAM RECOMMENDATION')}</div>
      <div class="ai-content">
        ${BL('Berdasarkan','Based on')} <strong>${s} ${BL('kursi','seats')}</strong>:<br>
        ${BL('Total Payroll','Total Payroll')}: <strong style="color:var(--pos)">Rp ${((restaurantData.salaries.gm + restaurantData.salaries.chef + restaurantData.salaries.server)/1000000).toFixed(1)}M/${BL('bln','mo')}</strong>
      </div>
    </div>
    <button class="btn-nav" onclick="nextStep()">${BL('LANJUT KE LAUNCH →','CONTINUE TO LAUNCH →')}</button>
  `;
}

// STEP 6: LAUNCH STRATEGY (AI)
function renderStep6(body) {
  body.innerHTML = `
    <div class="form-grid">
      <div class="fg"><div class="fl">${BL('MARKETING/BULAN','MARKETING/MONTH')}</div><input class="fi" value="${restaurantData.marketingBudget}"></div>
      <div class="fg"><div class="fl">${BL('GRAND OPENING','GRAND OPENING')}</div><input class="fi" value="15000000"></div>
    </div>

  body.innerHTML = `
